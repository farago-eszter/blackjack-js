<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="table">
      <h2 id="gameMessage"></h2>
      <div class="dealer">
        <h1>Dealer:</h1>
      </div>
      <div id="dealersCards" class="cards"></div>
      <div id="playersCards" class="cards"></div>
      <div class="player">
        <h1>Player:</h1>
      </div>
      <div class="bet-container">
        <img src="./assets/chips/bet-chip.svg" alt="" />
      </div>
      <div class="chips">
        <div class="chips-img-container">
          <img src="./assets/chips/chips.svg" alt="" />
        </div>
        <h2 id="chipsValue">100$</h2>
      </div>
      <div class="start-button">
        <button onclick="startRound()">Start</button>
      </div>
      <div class="game-buttons">
        <button id="hit" onclick="hit()">Hit</button>
        <button id="stand" onclick="stand()">Stand</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
